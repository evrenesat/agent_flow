[aflow]
default_workflow = "ralph"
keep_runs = 20
retry_inconsistent_checkpoint_state = 0

#### HARNESS PROFILES ####

[harness.opencode.profiles.turbo]
model = "zai-coding-plan/glm-5-turbo"

[harness.opencode.profiles.glm47]
model = "zai-coding-plan/glm-4.7"

[harness.claude.profiles.opus]
 model = "opus"
 effort = "medium"

[harness.claude.profiles.sonnet]
 model = "sonnet"

[harness.claude.profiles.haiku]
 model = "haiku"

[harness.codex.profiles.high]
model = "GPT-5.4"
effort = "high"

[harness.codex.profiles.mini]
model = "GPT-5.4-Mini"
effort = "high"

[harness.codex.profiles.nano]
model = "GPT-5.4-Nano"

#### WORKFLOWS ####
# RALPH LOOP
# This is a simple single step workflow that emulates ralph loop style execution.
#
[workflow.ralph.steps.implement_plan]
profile = "opencode.turbo"
prompts = ["input_vars", "simple_implementation"]
go = [
  { to = "END", when = "DONE || MAX_TURNS_REACHED" },
  { to = "implement_plan" },
]


# REVIEW-IMPLEMENT-REVIEW
# This workflow first requests an improvement review from a capable model before
# actually starting on implementation. A worker model then implements the whole
# plan in one go (one checkpoint per context). When the implementer thinks it is
# done, the workflow goes to a final review step. If the reviewer is satisfied it
# calls aflow-review-squash, which rewrites all post-handoff history into one
# final commit. If not satisfied, the reviewer creates a fix-up follow-up plan
# and the workflow loops back to implementation. This squash-on-approval behavior
# is specific to this workflow, not an engine-wide invariant.
[workflow.review_implement_review.steps.review_plan]
profile = "claude.opus"
prompts = ["review_plan"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "implement_plan" },
]

[workflow.review_implement_review.steps.implement_plan]
profile = "opencode.turbo"
prompts = ["input_vars", "cp_loop_implementation", "simple_implementation"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "review_implementation", when = "DONE" },
  { to = "implement_plan" },
]

[workflow.review_implement_review.steps.review_implementation]
profile = "codex.high"
prompts = ["input_vars","output_vars","review_squash"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "implement_plan", when = "NEW_PLAN_EXISTS" },
  { to = "END" },
]


# REVIEW-IMPLEMENT_CHECKPOINT-REVIEW-FINAL_REVIEW-FOLLOW_UP
# This workflow uses checkpoint-scoped review (aflow-review-checkpoint) and a
# no-squash final review (aflow-review-final). History is not rewritten on
# approval; the checkpoint commit structure is left intact.
#
[workflow.review_implement_cp_review.steps.review_plan]
profile = "claude.opus"
prompts = ["review_plan"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "implement_plan" },
]

[workflow.review_implement_cp_review.steps.implement_plan]
profile = "claude.haiku"
prompts = ["input_vars","cp_loop_implementation"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "review_cp_implementation" },
]

[workflow.review_implement_cp_review.steps.review_cp_implementation]
profile = "claude.sonnet"
prompts = ["input_vars","output_vars","review_cp"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "implement_plan", when = "NEW_PLAN_EXISTS || !DONE" },
  { to = "final_review" },
]

# Make a final review against original plan for the complete implementation.
[workflow.review_implement_cp_review.steps.final_review]
profile = "claude.opus"
prompts = ["input_vars","output_vars","final_review"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "followup", when = "NEW_PLAN_EXISTS" },
  { to = "END" },
]

[workflow.review_implement_cp_review.steps.followup]
profile = "claude.haiku"
prompts = ["input_vars","followup_implementation"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "final_review" },
]




#### PROMPTS ####

[prompts]

input_vars = """
ORIGINAL_PLAN: "{ORIGINAL_PLAN_PATH}". This is the original implementation plan.
ACTIVE_PLAN: "{ACTIVE_PLAN_PATH}". This maybe same as the original plan file, or could be a transient follow-up plan focused on fixing of review findings.
"""
output_vars = """
NEW_PLAN_PATH: "{NEW_PLAN_PATH}"
"""

review_plan = "Review the plan at {ORIGINAL_PLAN_PATH} for obvious/indisputable weak spots, ambiguity, and missing constraints and directly apply improvements to the plan file."

simple_implementation = "Work from {ACTIVE_PLAN_PATH}. Use 'aflow-execute-checkpoint' skill."

cp_loop_implementation = "Use 'aflow-execute-checkpoint' skill."

followup_implementation = "Use 'aflow-execute-plan' skill."


review_squash = "Use 'aflow-review-squash' skill."

final_review = "Use 'aflow-review-final' skill."

review_cp = "Use 'aflow-review-checkpoint' skill."
