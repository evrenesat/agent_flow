[aflow]
default_workflow = "ralph"
keep_runs = 20
max_turns = 15
retry_inconsistent_checkpoint_state = 1
banner_files_limit = 10
# max_same_step_turns limits how many consecutive turns the same workflow step
# can be selected before the run fails. Applies only to multi-step workflows.
# Set to 0 to disable. Default: 5.
max_same_step_turns = 5

#### HARNESS PROFILES ####

[harness.opencode.profiles.turbo]
model = "zai-coding-plan/glm-5-turbo"

[harness.opencode.profiles.glm47]
model = "zai-coding-plan/glm-4.7"

[harness.claude.profiles.opus]
model = "opus"
effort = "medium"

[harness.claude.profiles.sonnet]
model = "sonnet"

[harness.claude.profiles.haiku]
 model = "haiku"

[harness.codex.profiles.high]
model = "gpt-5.4"
effort = "high"

[harness.codex.profiles.mini]
model = "gpt-5.4-mini"
effort = "high"

[harness.codex.profiles.nano]
model = "gpt-5.4-nano"


#### Roles & Teams ####

[roles]
architech = 'claude.opus'
senior_architech = 'codex.high'
worker = 'claude.haiku'
reviewer = 'claude.sonnet'

[teams.codex1]
architech = 'codex.high'
senior_architech = 'codex.high'
reviewer = 'codex.high'
worker = 'codex.mini'

[teams.7teen]
architech = 'codex.mini'
reviewer = 'codex.mini'
worker = 'codex.nano'


#### PROMPTS ####

[prompts]

input_vars = """
ORIGINAL_PLAN: "{ORIGINAL_PLAN_PATH}". This is the original implementation plan.
ACTIVE_PLAN: "{ACTIVE_PLAN_PATH}". This maybe same as the original plan file, or could be a transient follow-up plan focused on fixing of review findings.
"""
output_vars = """
NEW_PLAN_PATH: "{NEW_PLAN_PATH}"
"""

review_plan = "Review the plan at {ORIGINAL_PLAN_PATH} for obvious/indisputable weak spots, ambiguity, and missing constraints and directly apply improvements to the plan file."

simple_implementation = "Work from {ACTIVE_PLAN_PATH}. Use 'aflow-execute-plan' skill."

cp_loop_implementation = "Use 'aflow-execute-checkpoint' skill."

followup_implementation = "Use 'aflow-execute-plan' skill."


review_squash = "Use 'aflow-review-squash' skill."

final_review = "Use 'aflow-review-final' skill."

review_cp = "Use 'aflow-review-checkpoint' skill."
