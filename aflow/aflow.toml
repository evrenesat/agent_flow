[aflow]
# Default workflow used when the CLI does not name one.
default_workflow = "ralph"
# Keep this many run directories under `.aflow/runs/` before pruning the oldest.
keep_runs = 20
# Hard turn cap for a run. `--max-turns` can override this for a single invocation.
max_turns = 15
# Retry a clean harness exit that leaves the plan in inconsistent checkpoint state this many times.
retry_inconsistent_checkpoint_state = 1
# Show at most this many changed files in the live banner before collapsing the list.
banner_files_limit = 10
# max_same_step_turns limits how many consecutive turns the same workflow step
# can be selected before the run fails. Applies only to multi-step workflows.
# Set to 0 to disable. Default: 5.
max_same_step_turns = 5

#### HARNESS PROFILES ####

# Harness profiles map a harness name to the model and effort values it should run.
[harness.opencode.profiles.turbo]
# The harness model identifier for this profile.
model = "zai-coding-plan/glm-5-turbo"

[harness.opencode.profiles.glm47]
# The harness model identifier for this profile.
model = "zai-coding-plan/glm-4.7"

[harness.claude.profiles.opus]
# The harness model identifier for this profile.
model = "opus"
# Optional effort setting passed through to harnesses that support it.
effort = "medium"

[harness.claude.profiles.sonnet]
# The harness model identifier for this profile.
model = "sonnet"

[harness.claude.profiles.haiku]
# The harness model identifier for this profile.
model = "haiku"

[harness.codex.profiles.high]
# The harness model identifier for this profile.
model = "gpt-5.4"
# Optional effort setting passed through to harnesses that support it.
effort = "high"

[harness.codex.profiles.mini]
# The harness model identifier for this profile.
model = "gpt-5.4-mini"
# Optional effort setting passed through to harnesses that support it.

[harness.codex.profiles.nano]
# The harness model identifier for this profile.
model = "gpt-5.4-mini"
effort = "none"


#### Roles & Teams ####

# Global role-to-selector mappings. Team overrides can replace a subset of these.
[roles]
architect = 'claude.opus'
senior_architect = 'codex.high'
worker = 'claude.haiku'
reviewer = 'claude.sonnet'

# Team-specific role overrides. Missing roles fall back to the global [roles] map.
[teams.codex1]
architect = 'codex.high'
senior_architect = 'codex.high'
reviewer = 'codex.high'
worker = 'codex.mini'

[teams.7teen]
architect = 'codex.mini'
reviewer = 'codex.mini'
worker = 'codex.nano'


#### PROMPTS ####

# Named prompt templates that workflow steps reference by key.
[prompts]

implementation_plans = """
This is the original implementation plan:
ORIGINAL_PLAN: "{ORIGINAL_PLAN_PATH}".

This is the active plan for the current implementation step:
ACTIVE_PLAN: "{ACTIVE_PLAN_PATH}".

NEXT_CHECKPOINT: "{NEXT_CP}".
{WORK_ON_NEXT_CHECKPOINT_CMD}
"""

review_plans = """
This is the original implementation plan:
ORIGINAL_PLAN: "{ORIGINAL_PLAN_PATH}".

This can same as the original plan file, or could be a smaller follow-up plan focused on fixing of review findings:
ACTIVE_PLAN: "{ACTIVE_PLAN_PATH}".

If ORIGINAL_PLAN and ACTIVE_PLAN point to different files, take both into account in your review.

This file is not yet exist, if you are tasked to create a follow-up plan for possible review fixes, use this path:
NEW_PLAN_PATH: "{NEW_PLAN_PATH}"
"""

cp_loop_implementation = "Implement {ACTIVE_PLAN_PATH} using 'aflow-execute-checkpoint' skill. {WORK_ON_NEXT_CHECKPOINT_CMD}"
followup_implementation = "Implement {ACTIVE_PLAN_PATH} using 'aflow-execute-plan' skill."

review_squash = "Use 'aflow-review-squash' skill. Take into account both ORIGINAL_PLAN and ACTIVE_PLAN (if they differ)"
final_review = "Use 'aflow-review-final' skill."
review_cp = "Use 'aflow-review-checkpoint' skill."
review_plan = "Review the plan at {ORIGINAL_PLAN_PATH} for obvious/indisputable weak spots, ambiguity, and missing constraints and directly apply improvements to the plan file."
